<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moo Elixir - Premium Organic Hair Oil</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
* {margin:0; padding:0; box-sizing:border-box;}

body {
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  line-height:1.6;
  color:#333;
}

.container {max-width:1200px; margin:0 auto; padding:0 20px;}

header {
  background:#8B4513;
  color:white;
  padding:1rem 20px;
  position:fixed;
  width:100%;
  top:0;
  z-index:1000;
}

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ✅ LOGO */
.logo-img {
  width:60px;
  height:auto;
}

.nav-links {
  display:flex;
  list-style:none;
  gap:2rem;
}

.nav-links a {
  color:white;
  text-decoration:none;
}

.nav-links a:hover {
  color:#90EE90;
}

.hamburger {
  display:none;
  font-size:1.8rem;
  cursor:pointer;
}

.hero {
  height:80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  margin-top:70px;
  position:relative;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1s;
}

.slide.active {opacity:1;}

.hero-content {
  position:relative;
  z-index:2;
}

.hero h1 {font-size:3rem;}
.hero p {font-size:1.2rem; margin-bottom:2rem;}

.cta-button {
  background:#228B22;
  color:white;
  padding:12px 25px;
  border-radius:50px;
  text-decoration:none;
}

section {padding:80px 0;}

.section-title {
  text-align:center;
  font-size:2rem;
  margin-bottom:3rem;
  color:#8B4513;
}

.products-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:2rem;
}

.product-card {
  background:white;
  padding:1.5rem;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.product-image {
  width:100px;
  height:100px;
  background:#228B22;
  border-radius:50%;
  margin:0 auto 1rem;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.price {
  font-size:1.3rem;
  font-weight:bold;
  color:#8B4513;
}

.buy-btn {
  background:#8B4513;
  color:white;
  padding:10px;
  border:none;
  border-radius:25px;
  width:100%;
  margin-top:10px;
  cursor:pointer;
}

footer {
  background:#8B4513;
  color:white;
  text-align:center;
  padding:1.5rem 0;
}

@media(max-width:768px){
  .nav-links {display:none;}
  .hamburger {display:block;}
}
</style>
</head>

<body>

<header>
<div class="container">
<nav>

<!-- ✅ LOGO FIX -->
<img src="bottle.png" class="logo-img" alt="Moo Elixir Logo">

<i class="fas fa-bars hamburger" onclick="toggleMenu()"></i>

<ul class="nav-links" id="nav-links">
<li><a href="#about">About</a></li>
<li><a href="#products">Products</a></li>
<li><a href="#contact">Contact</a></li>
</ul>

</nav>
</div>
</header>

<section class="hero">
<div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1605902711622-cfb43c44356f');"></div>

<div class="hero-content">
<h1>Moo Elixir</h1>
<p>100% Organic Hair Oil</p>
<a class="cta-button" href="#products">Shop Now</a>
</div>
</section>

<section id="about">
<h2 class="section-title">About Us</h2>
<div class="container">
<p>Moo Elixir offers premium organic hair oil made from natural ingredients.</p>
</div>
</section>

<section id="products">
<h2 class="section-title">Products</h2>
<div class="container products-grid">

<div class="product-card">
<div class="product-image">💧</div>
<h3>Hair Oil</h3>
<div class="price">1200 PKR</div>
<button class="buy-btn">Buy Now</button>
</div>

</div>
</section>

<section id="contact">
<h2 class="section-title">Contact</h2>
<div class="container">
<p>Contact us via WhatsApp or form.</p>
</div>
</section>

<footer>
<p>© 2026 Moo Elixir</p>
</footer>

<script>
function toggleMenu(){
document.getElementById('nav-links').classList.toggle('active');
}
</script>

</body>
</html>
